<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Massage Routine — Cheat Sheet</title>
  <style>
    :root {
      --bg: #f5f3ee;
      --card: #ffffff;
      --ink: #2b2620;
      --muted: #8a8175;
      --line: #e7e2d8;
      --prone: #2f6f6a;
      --prone-soft: #e2efed;
      --supine: #8a5a2b;
      --supine-soft: #f3e8da;
      --pill: #eef0f2;
      --pill-ink: #3a4250;
      --pill-line: #dfe3e8;
      --accent: #c2553f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    /* ---- Page header ---- */
    header.page {
      text-align: center;
      margin-bottom: 28px;
    }
    header.page h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      letter-spacing: -0.02em;
    }
    header.page .total {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }
    header.page .total strong { color: var(--ink); }

    /* ---- Position section ---- */
    .position {
      margin-top: 36px;
    }
    .position > .position-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 3px solid currentColor;
    }
    .position.prone  > .position-head { color: var(--prone); }
    .position.supine > .position-head { color: var(--supine); }
    .position-head h2 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: -0.01em;
    }
    .position-head .dur {
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0.85;
    }

    /* ---- Region cards grid ---- */
    .regions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }
    /* let the wide "Back" / big cards span full width */
    .card.wide { grid-column: 1 / -1; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 18px 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03), 0 6px 16px rgba(0,0,0,0.04);
    }
    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .card-head h3 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: -0.01em;
    }
    .card-head h3 .note {
      font-weight: 400;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .time-badge {
      flex: none;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 4px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .prone  .time-badge { background: var(--prone-soft);  color: var(--prone); }
    .supine .time-badge { background: var(--supine-soft); color: var(--supine); }

    /* ---- Sub-groups inside a card ---- */
    .group { margin-top: 14px; }
    .group:first-child { margin-top: 0; }
    .group-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .group-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ---- Stroke pills ---- */
    .strokes {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .strokes li {
      background: var(--pill);
      color: var(--pill-ink);
      border: 1px solid var(--pill-line);
      border-radius: 999px;
      padding: 4px 11px;
      font-size: 0.85rem;
      font-weight: 500;
      white-space: nowrap;
    }
    /* emphasised pills (key moves / transitions) */
    .strokes li.key {
      background: #fff;
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    /* repeat / counter notation pill */
    .strokes li.rep {
      background: transparent;
      border-style: dashed;
      color: var(--muted);
      font-weight: 600;
    }

    footer.page {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ---- Legend ---- */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 14px;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch {
      width: 22px; height: 14px; border-radius: 999px; display: inline-block;
      border: 1px solid var(--pill-line);
    }
    .swatch.prone  { background: var(--prone-soft); border-color: var(--prone); }
    .swatch.supine { background: var(--supine-soft); border-color: var(--supine); }
    .swatch.key    { background: #fff; border-color: var(--accent); }

    /* ---- Load / error states ---- */
    .notice {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 16px 18px;
      margin-top: 24px;
      color: var(--ink);
    }
    .notice code {
      background: var(--pill);
      border: 1px solid var(--pill-line);
      border-radius: 5px;
      padding: 1px 5px;
      font-size: 0.9em;
    }

    @media print {
      body { background: #fff; }
      .card { box-shadow: none; break-inside: avoid; }
      .position { break-inside: avoid; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="page">
      <h1>Massage Routine</h1>
      <div class="total">Full session · <strong>60 min</strong> &nbsp;|&nbsp; Prone 30 · Supine 30</div>
      <div class="legend">
        <span><span class="swatch prone"></span> Prone</span>
        <span><span class="swatch supine"></span> Supine</span>
        <span><span class="swatch key"></span> Key move / transition</span>
        <span>&nbsp;×2 = repeat each side</span>
      </div>
    </header>

    <!-- Content is generated from massage-routine.txt -->
    <div id="routine">
      <div class="notice">Loading routine…</div>
    </div>

    <footer class="page">
      Memorization cheat sheet · eff = effleurage · cir = circle · x-fiber = cross-fiber ·
      edit <code>massage-routine.txt</code> to change this page
    </footer>

  </div>

  <script>
    // ---- Parse the editable text file into a routine structure ----
    function parseRoutine(text) {
      const positions = [];
      let pos = null, region = null;

      text.split(/\r?\n/).forEach(function (raw) {
        const t = raw.trim();
        if (t === '' || t.startsWith('//')) return;

        if (t.startsWith('##')) {                       // region
          const [name, time] = splitPipe(t.slice(2));
          region = { name: name, time: time, intro: [], groups: [] };
          if (pos) pos.regions.push(region);
        } else if (t.startsWith('#')) {                 // position
          const [name, dur] = splitPipe(t.slice(1));
          pos = { name: name, dur: dur, regions: [] };
          positions.push(pos);
        } else if (region) {                            // strokes line
          const ci = t.indexOf(':');
          if (ci > 0 && t.slice(0, ci).indexOf(',') === -1) {
            region.groups.push({
              label: t.slice(0, ci).trim(),
              strokes: parseStrokes(t.slice(ci + 1))
            });
          } else {
            region.intro = region.intro.concat(parseStrokes(t));
          }
        }
      });
      return positions;
    }

    function splitPipe(s) {
      const i = s.indexOf('|');
      return i === -1
        ? [s.trim(), '']
        : [s.slice(0, i).trim(), s.slice(i + 1).trim()];
    }

    function parseStrokes(s) {
      return s.split(',').map(function (raw) {
        let txt = raw.trim();
        let type = 'normal';
        if (txt.startsWith('*')) { type = 'key'; txt = txt.slice(1).trim(); }
        else if (txt.startsWith('~')) { type = 'rep'; txt = txt.slice(1).trim(); }
        return { text: txt, type: type };
      }).filter(function (st) { return st.text !== ''; });
    }

    // ---- Render ----
    function esc(s) {
      return s.replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }

    function fmtName(name) {
      // show "(...)" notes small & grey
      return esc(name).replace(/\(([^)]*)\)/,
        '<span class="note">($1)</span>');
    }

    function strokeList(strokes) {
      if (!strokes.length) return '';
      const items = strokes.map(function (st) {
        const cls = st.type === 'key' ? ' class="key"'
          : st.type === 'rep' ? ' class="rep"' : '';
        return '<li' + cls + '>' + esc(st.text) + '</li>';
      }).join('');
      return '<ul class="strokes">' + items + '</ul>';
    }

    function renderRegion(r) {
      const wide = r.groups.length >= 3 ? ' wide' : '';
      const badge = r.time
        ? '<span class="time-badge">' + esc(r.time) + '</span>' : '';
      let body = strokeList(r.intro);
      r.groups.forEach(function (g) {
        body += '<div class="group"><div class="group-label">' +
          esc(g.label) + '</div>' + strokeList(g.strokes) + '</div>';
      });
      return '<div class="card' + wide + '">' +
        '<div class="card-head"><h3>' + fmtName(r.name) + '</h3>' + badge + '</div>' +
        body + '</div>';
    }

    function renderRoutine(positions) {
      return positions.map(function (p, i) {
        const cls = i % 2 === 0 ? 'prone' : 'supine';
        const dur = p.dur ? '<span class="dur">' + esc(p.dur) + '</span>' : '';
        const cards = p.regions.map(renderRegion).join('');
        return '<section class="position ' + cls + '">' +
          '<div class="position-head"><h2>' + esc(p.name) + '</h2>' + dur + '</div>' +
          '<div class="regions">' + cards + '</div></section>';
      }).join('');
    }

    // ---- Load the data file ----
    fetch('massage-routine.txt?v=' + Date.now(), { cache: 'no-store' })
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.text();
      })
      .then(function (text) {
        const positions = parseRoutine(text);
        document.getElementById('routine').innerHTML = renderRoutine(positions);
      })
      .catch(function (err) {
        document.getElementById('routine').innerHTML =
          '<div class="notice"><strong>Couldn\'t load <code>massage-routine.txt</code>.</strong><br>' +
          esc(String(err)) +
          '<br><br>This page reads the routine from that file over the network, ' +
          'so view it through the published site (or a local web server) rather than ' +
          'opening the HTML directly from disk.</div>';
      });
  </script>
</body>

</html>
