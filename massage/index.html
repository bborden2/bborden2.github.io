<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2f6fbf" />
  <title>Massage Routines</title>
  <link rel="stylesheet" href="routine.css" />
  <style>
    .routine-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.75rem; max-width: 560px; margin-inline: auto; }
    .routine-list a {
      display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem;
      background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 0.9rem 1.1rem; text-decoration: none; color: var(--ink);
    }
    .routine-list a:hover { border-color: var(--accent); }
    .routine-list .name { font-weight: 700; }
    .routine-list .meta { color: var(--ink-soft); font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <h1>Massage Routines</h1>
      <p class="subtitle">Cheat sheets</p>
    </header>
    <ul class="routine-list">
      <li>
        <a href="50minrelaxation.html">
          <span class="name">50 Min Relaxation</span>
          <span class="meta">50 min</span>
        </a>
      </li>
    </ul>
  </div>
</body>
</html>
